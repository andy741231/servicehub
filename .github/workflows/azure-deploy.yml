name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client (React/Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Create deployment zip
        run: |
          # Exclude dev-only dirs to keep zip smaller
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "client/node_modules/*" \
            -x "shared/node_modules/*" \
            -x "node_modules/.cache/*" \
            -x ".github/*"
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Deploy via Kudu Zip Deploy API
        run: |
          curl -X POST \
            --fail \
            -u "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PWD }}" \
            "https://houstonservicehub.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 300 \
            -v
