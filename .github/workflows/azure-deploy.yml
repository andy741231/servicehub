name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client (React/Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Create deployment zip (source + built client, no node_modules)
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "client/node_modules/*" \
            -x "server/node_modules/*" \
            -x "shared/node_modules/*" \
            -x ".github/*" \
            -x "*.env"
          # Include root node_modules/@prisma/client (generated, needed at runtime)
          zip -ur deploy.zip node_modules/@prisma node_modules/.prisma
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Deploy via Kudu Zip Deploy API
        env:
          KUDU_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          KUDU_PWD: ${{ secrets.AZURE_DEPLOY_PWD }}
        run: |
          curl -X POST \
            --fail \
            -u "${KUDU_USER}:${KUDU_PWD}" \
            "https://houstonservicehub.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 300
          echo "Deploy complete"
